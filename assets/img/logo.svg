<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="160" viewBox="0 0 640 160" role="img" aria-label="Cloud Network Solutions logo">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ea8ff"/>
      <stop offset="1" stop-color="#7cf0c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Mark -->
  <g transform="translate(20,20)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="#0f1a33" stroke="rgba(255,255,255,.12)" />
    <!-- Cloud -->
    <path d="M72 76c10 0 18-8 18-18 0-9-6-16-14-18-3-12-14-20-27-18-10 1-18 8-21 17-9 1-16 9-16 18 0 10 8 19 19 19h41z"
          fill="url(#g1)"/>
    <!-- Network nodes -->
    <g fill="none" stroke="#e8eefc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
      <circle cx="36" cy="88" r="6" fill="#e8eefc"/>
      <circle cx="60" cy="98" r="6" fill="#e8eefc"/>
      <circle cx="84" cy="88" r="6" fill="#e8eefc"/>
      <path d="M41 88h13l6 10h14"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(160,54)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="800" fill="#e8eefc">
      Cloud Network
    </text>
    <text x="0" y="40" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="800" fill="#e8eefc">
      Solutions
    </text>
    <rect x="0" y="56" width="240" height="6" rx="3" fill="url(#g1)" opacity="0.9"/>
  </g>
</svg>
